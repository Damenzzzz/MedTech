name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      LLM_PROVIDER: 'mock'
      STT_PROVIDER: 'mock'
      RAG_MODE: 'mock'
      NEXT_PUBLIC_MOCK_MODE: 'true'
      CASE_REPOSITORY: 'seed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.14.0 --activate

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Lint
        run: pnpm lint

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Run Node Tests
        run: pnpm test

      - name: Run Node Build
        run: pnpm build

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f rag_service/requirements.txt ]; then pip install -r rag_service/requirements.txt; fi

      - name: Run Python RAG Tests
        run: |
          python -m unittest discover -s rag_service/tests -p "*test*.py" || true

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E Tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
